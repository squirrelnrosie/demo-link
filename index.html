<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct to Tourist Guardian AI - 觀光AI守護神</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6">

    <div class="relative flex items-center justify-center mb-8">
        <div class="absolute w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
        <div class="w-16 h-16 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="text-center space-y-4 max-w-sm">
        <h1 class="text-2xl font-bold tracking-tight">系統連線中</h1>
        <p class="text-slate-400 text-sm leading-relaxed">
            正在將您導向至 Direct to Tourist Guardian AI - 觀光AI守護神，請確保您的手機已連線至指定的 <span class="text-blue-300 font-semibold">Wi-Fi 熱點</span>。
        </p>
    </div>

    <div class="mt-10">
        <a id="link" href="http://192.168.137.1:5173" 
           class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all active:scale-95">
            立即進入 Direct to Tourist Guardian AI - 觀光AI守護神
        </a>
    </div>

    <p class="mt-8 text-xs text-slate-500 italic">
        * 若自動跳轉未觸發，請點擊上方按鈕
    </p>

    <script>
        // --- 配置區域 ---
        const TARGET_URL = "http://192.168.137.1:4173/report";
        // ----------------

        const linkBtn = document.getElementById('link');
        linkBtn.href = TARGET_URL;

        // 延遲一秒後自動跳轉，給使用者一點心理準備，也顯得比較有質感
        setTimeout(() => {
            window.location.href = TARGET_URL;
        }, 1500);
    </script>

</body>
</html>
